<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bookmark</title>
    <link rel="shortcut icon" href="images/bookmark.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="px-5">
    <div class="heading py-5">
    <h1 class=" py-2">Bookmarker</h1>
</div>

    
        <div class="bookmark text-center py-3 ">
            <h2 class=" py-4">
                <i class="fa-solid fa-bookmark"></i>
                Bookmark your favorite sites
                <i class="fa-solid fa-bookmark"></i>

            </h2>

            <form class=" text-start" >
       <div class=" siteName my-4">
        <label for="name"><i class="fa-solid fa-book-bookmark pe-2"></i>
            Site Name</label>
        <input oninput="validateForm(this)"  class="form-control " type="text" id="name" placeholder="Bookmark Name">

       </div>
       <div class=" site-URL my-4">
        <label for="URL"><i class="fa-solid fa-link pe-2"></i>
            Site URL</label>
        <input oninput="validateForm(this)" class="form-control " type="text" id="URL" placeholder="Website URL">

       </div>
       <div class="text-center my-3">
        <button id="submit"  onclick="submitBtn()" type="button" class="btn px-5 ">Submit</button>
       </div>
            </form>
        </div>
    </section>


    <section>
        <div class="container text-center">
            <div class="row ">
        <table class=" bg-light my-4  ">
            <thead>
            <tr >
                <th class="py-2">index</th>
                <th>Website Name</th>
                <th>Visit</th>
                <th>Delete</th>
            </tr></thead>
            <tbody id="tableBody">
              

            </tbody>
            
        </table></div></div>
    </section>
<div class="container">
    <div class="row">
        <div id="alert" class="alert px-4 py-4 d-none  bg-white rounded-2">
        <div class="box d-flex justify-content-between mb-3 text-align-center">
            <div class="circles d-flex align-items-center">
               <span class="circle1 rounded-circle m-1 "></span>
               <span class="circle2 rounded-circle m-1"></span>
               <span class="circle3 rounded-circle m-1"></span>
            </div>
            <div>
                <button onclick="closeBtn()" class="closebtn border-0 "><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
        <div class="text">
        <p>Site Name or Url is not valid, Please follow the rules below :</p>
        <p><i class="fa-regular fa-circle-right p-2 me-2"></i>Site name must contain at least 3 characters</p>
        <p><i class="fa-regular fa-circle-right p-2 me-2"></i>Site URL must be a valid one</p></div>
    </div>
    </div>
</div>
    
    
    <script src="js/index.js"></script>
</body>
</html>
